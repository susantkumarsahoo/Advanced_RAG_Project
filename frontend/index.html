<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RAG Chat</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f12;
    --surface: #161a20;
    --border: #252a33;
    --accent: #00e5a0;
    --accent2: #0099ff;
    --text: #e8eaf0;
    --muted: #5a6270;
    --user-bg: #1a2535;
    --bot-bg: #111815;
    --radius: 12px;
    --font-ui: 'Syne', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    width: 100%;
    max-width: 780px;
    padding: 24px 20px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  header h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: -0.02em; }
  header span { font-size: 0.75rem; color: var(--muted); font-family: var(--font-mono); margin-left: auto; }

  #chat {
    flex: 1;
    width: 100%;
    max-width: 780px;
    overflow-y: auto;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .msg {
    display: flex;
    flex-direction: column;
    gap: 6px;
    animation: fadeUp 0.25s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg .label {
    font-size: 0.7rem;
    font-family: var(--font-mono);
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .msg.user .label { color: var(--accent2); text-align: right; }
  .msg.user { align-items: flex-end; }
  .msg.bot  { align-items: flex-start; }

  .bubble {
    max-width: 88%;
    padding: 14px 18px;
    border-radius: var(--radius);
    line-height: 1.65;
    font-size: 0.92rem;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .msg.user .bubble {
    background: var(--user-bg);
    border: 1px solid #1e3050;
    color: var(--text);
  }

  .msg.bot .bubble {
    background: var(--bot-bg);
    border: 1px solid var(--border);
    color: var(--text);
  }

  .cursor {
    display: inline-block;
    width: 2px; height: 1em;
    background: var(--accent);
    vertical-align: text-bottom;
    animation: blink 0.7s step-end infinite;
    margin-left: 2px;
  }
  @keyframes blink { 50% { opacity: 0; } }

  .empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--muted);
    font-size: 0.88rem;
    text-align: center;
  }
  .empty .icon { font-size: 2.5rem; }

  footer {
    width: 100%;
    max-width: 780px;
    padding: 16px 20px 24px;
    border-top: 1px solid var(--border);
  }

  .input-row {
    display: flex;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    transition: border-color 0.2s;
  }
  .input-row:focus-within { border-color: var(--accent); }

  textarea {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font-ui);
    font-size: 0.92rem;
    resize: none;
    line-height: 1.5;
    max-height: 140px;
  }

  button {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 8px;
    width: 38px; height: 38px;
    cursor: pointer;
    font-size: 1.1rem;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    align-self: flex-end;
    transition: opacity 0.15s, transform 0.1s;
  }
  button:hover:not(:disabled) { opacity: 0.85; transform: scale(1.05); }
  button:disabled { opacity: 0.3; cursor: not-allowed; }

  .hint { font-size: 0.72rem; color: var(--muted); margin-top: 8px; text-align: center; }
</style>
</head>
<body>

<header>
  <div class="logo">⚡</div>
  <h1>RAG Chat</h1>
  <span>SupplyCode.pdf</span>
</header>

<div id="chat">
  <div class="empty" id="empty">
    <div class="icon">🔍</div>
    <div>Ask anything about your document</div>
  </div>
</div>

<footer>
  <div class="input-row">
    <textarea id="input" rows="1" placeholder="Ask a question…" maxlength="1000"></textarea>
    <button id="send" title="Send">➤</button>
  </div>
  <div class="hint">Enter to send · Shift+Enter for new line</div>
</footer>

<script>
  const API = "http://localhost:8000";
  const chat = document.getElementById("chat");
  const input = document.getElementById("input");
  const sendBtn = document.getElementById("send");
  const empty = document.getElementById("empty");

  // Auto-resize textarea
  input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 140) + "px";
  });

  input.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
  });
  sendBtn.addEventListener("click", send);

  function addMsg(role, text = "") {
    empty?.remove();
    const div = document.createElement("div");
    div.className = `msg ${role}`;

    const label = document.createElement("div");
    label.className = "label";
    label.textContent = role === "user" ? "You" : "Assistant";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;

    div.appendChild(label);
    div.appendChild(bubble);
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return bubble;
  }

  async function send() {
    const query = input.value.trim();
    if (!query) return;

    input.value = "";
    input.style.height = "auto";
    sendBtn.disabled = true;

    addMsg("user", query);
    const botBubble = addMsg("bot");

    // Streaming cursor
    const cursor = document.createElement("span");
    cursor.className = "cursor";
    botBubble.appendChild(cursor);

    try {
      const res = await fetch(`${API}/ask`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ query }),
      });

      if (!res.ok) throw new Error(`Server error: ${res.status}`);

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let answer = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        answer += decoder.decode(value, { stream: true });
        botBubble.textContent = answer;
        botBubble.appendChild(cursor);
        chat.scrollTop = chat.scrollHeight;
      }

      cursor.remove();

    } catch (err) {
      cursor.remove();
      botBubble.textContent = `❌ Error: ${err.message}`;
    }

    sendBtn.disabled = false;
    input.focus();
  }
</script>
</body>
</html>
