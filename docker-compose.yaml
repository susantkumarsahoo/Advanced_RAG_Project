version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag_app
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./rag_project:/app/rag_project
      - ./artifacts:/app/artifacts   # vector DB / embeddings
      - ./data:/app/data             # optional runtime data
    depends_on:
      - redis
    networks:
      - rag_network

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag_streamlit
    command: streamlit run streamlit_app.py --server.port=8501 --server.address=0.0.0.0
    restart: always
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./rag_project:/app/rag_project
      - ./artifacts:/app/artifacts
    depends_on:
      - app
    networks:
      - rag_network

  redis:
    image: redis:7-alpine
    container_name: rag_redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - rag_network

  nginx:
    image: nginx:latest
    container_name: rag_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app
      - streamlit
    networks:
      - rag_network

networks:
  rag_network:
    driver: bridge